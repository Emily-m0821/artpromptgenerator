<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    
 <link rel="stylesheet" href="contact.css">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
     <div href="index.html" class="title">Artwork</div>
    <nav class="navigate">
      <a href="prompt.html">Prompt Generator</a>
      <a href="challenge.html">Challenge Mode</a>
      <a href="reference.html">References</a>
      <a href="community.html">Art Community</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>

<!-- BACKGROUND -->
<div class="background"></div>
<div class="overlay"></div>

<!-- MAIN CONTENT -->
<div class="container">

  <!-- LEFT TEXT -->
  <div class="left">
    <h2>I Like Your Idea!<br>Let Me Grab My Sketchbook.</h2>
    <p>
      If you have any questions or just want to say hi, please send me a message.
      I'd love to be in touch with you. Use the contact form to email me your
      suggestions and ideas.
    </p>
  </div>

  <!-- FORM -->
  <div class="form-card">
    <form id="contact-form">

      <div class="row">
        <div>
          <label>First Name</label>
          <input type="text" name="first_name" required>
        </div>
        <div>
          <label>Last Name</label>
          <input type="text" name="last_name" required>
        </div>
      </div>

      <label>Email Address</label>
      <input type="email" name="email" required>

      <label>Message</label>
      <textarea name="message" rows="6" required></textarea>

      <button type="submit">Send</button>
    </form>
  </div>

</div>

<script src="contact.js"></script>
    
</body>
</html>
